name: Deploy Markdown Site

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Pandoc
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc

      - name: Create output directory
        run: mkdir -p _site

      - name: Copy assets
        run: |
          find . -maxdepth 1 \
            \( -name "*.css" -o -name "*.png" -o -name "*.jpg" -o -name "*.jpeg" -o -name "*.gif" -o -name "*.svg" -o -name "*.ico" \) \
            -exec cp {} _site/ \;

      - name: Convert Markdown to HTML
        run: |
          find . -name "*.md" \
            -not -path "./.github/*" \
            -not -path "./_site/*" \
            | while read file; do

              rel="${file#./}"
              dir=$(dirname "$rel")
              base=$(basename "$rel" .md)

              mkdir -p "_site/$dir"

              pandoc \
                "$file" \
                --template=deployment/templates/default.html \
                --from=gfm \
                --highlight-style=breezedark \
                --lua-filter=deployment/mermaid/mermaid.lua \
                --include-before-body=deployment/templates/header.html \
                --include-after-body=deployment/templates/footer.html \
                --include-after-body=deployment/mermaid/mermaid.html \
                --metadata title="$base" \
                -o "_site/$dir/$base.html"

            done
      
      - name: Generate Index
        run: |
          cat > _site/index.html <<EOF
          <!DOCTYPE html>
          <html>
          <head>
            <meta charset="UTF-8">
            <title>Documentation</title>
            <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.9.0/github-markdown.min.css" integrity="sha512-Ouq1+UcR9ENXndFyd/YA9i+ETLJmX3WoaMBF/nDzdqJbipKGL/SAbkO+qjDoxfD/dhZs4ZqgR9vXkolrK77xmQ==" crossorigin="anonymous" referrerpolicy="no-referrer" />
          </head>
          <body>
            <h1>Documentation</h1>
          EOF

          generate_tree() {
            local dir="$1"

            echo "<ul>" >> _site/index.html

            # Directories first
            find "$dir" -mindepth 1 -maxdepth 1 -type d | sort | while read subdir; do
              name=$(basename "$subdir")
              echo "<li><strong>📁 $name</strong>" >> _site/index.html
              generate_tree "$subdir"
              echo "</li>" >> _site/index.html
            done

            # Then HTML files
            find "$dir" -mindepth 1 -maxdepth 1 -type f -name "*.html" ! -name "index.html" | sort | while read file; do
              rel="${file#_site/}"
              name=$(basename "$file" .html)
              echo "<li><a href=\"$rel\">$name</a></li>" >> _site/index.html
            done

            echo "</ul>" >> _site/index.html
          }

          generate_tree "_site"

          cat >> _site/index.html <<EOF
          </body>
          </html>
          EOF

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
